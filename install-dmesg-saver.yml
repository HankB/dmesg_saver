---
# install-dmesg-saver.yml
#
# Install the mv-dmesg script and systemd service on the sending host, and
# prepare the storage host to receive dmesg files.
#
# Usage:
#   ansible-playbook install-dmesg-saver.yml -i inventory -b -K \
#       --extra-vars "target_host=ryugu storage_host=<hostname>"
#
# Prerequisites:
#   - git must be installed on the sending host (post-boot.yml handles this)
#   - /mnt/data/save must exist on the sending host (rpi_repartition.sh handles this)
#   - /mnt/dmesg/IoT must already exist on the storage host
#   - Passwordless SSH from the Ansible control node to both hosts
#   - target_host and storage_host must both be defined in inventory

# =============================================================================
# Play 1: Prepare the sending host, gather key and hostname for Play 2
# =============================================================================
- name: Configure target host
  hosts: "{{ target_host }}"
  become: yes
    
  roles:
      - user_setup
      - data_mount
      - dmesg_saver

# =============================================================================
# Play 2: Prepare the storage host
# =============================================================================

- name: Prepare storage host
  hosts: "{{ storage_host }}"
  become: yes

  vars:
    storage_user: "{{ ansible_user | default(lookup('env','USER')) }}"

  roles:
    - storage_target