---
# install-mv-dmesg.yml
#
# Install the mv-dmesg script and systemd service on the sending host, and
# prepare the storage host to receive dmesg files.
#
# Usage:
#   ansible-playbook install-mv-dmesg.yml -i inventory -b -K \
#       --extra-vars "target_host=ryugu storage_host=<hostname>"
#
# Prerequisites:
#   - git must be installed on the sending host (post-boot.yml handles this)
#   - /mnt/data/save must exist on the sending host (rpi_repartition.sh handles this)
#   - /mnt/dmesg/IoT must already exist on the storage host
#   - Passwordless SSH from the Ansible control node to both hosts
#   - target_host and storage_host must both be defined in inventory

# =============================================================================
# Play 1: Prepare the sending host, gather key and hostname for Play 2
# =============================================================================
- name: Install mv-dmesg on sending host
  hosts: "{{ target_host }}"
  tasks:

    - name: get connecting username
      become: no
      command: id -un
      register: connecting_user
      changed_when: false

    - name: set user fact
      set_fact:
        target_user: "{{ connecting_user.stdout }}"

    - name: clone dmesg_saver repo to /tmp
      become: no
      git:
        repo: https://github.com/HankB/dmesg_saver.git
        dest: /tmp/dmesg_saver
        version: main
        force: yes

    - name: install mv-dmesg.sh to /usr/local/bin
      become: yes
      copy:
        src: /tmp/dmesg_saver/mv-dmesg.sh
        dest: /usr/local/bin/mv-dmesg.sh
        mode: '0755'
        remote_src: yes

    - name: ensure /mnt/data/save exists
      become: yes
      file:
        path: /mnt/data/save
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"

    - name: substitute username in mv-dmesg.service template
      become: no
      replace:
        path: /tmp/dmesg_saver/systemd/mv-dmesg.service
        regexp: '{% raw %}{{ username }}{% endraw %}'
        replace: "{{ target_user }}"

    - name: substitute storage_host in mv-dmesg.service template
      become: no
      replace:
        path: /tmp/dmesg_saver/systemd/mv-dmesg.service
        regexp: '{% raw %}{{ storage_host }}{% endraw %}'
        replace: "{{ storage_host }}"

    - name: install mv-dmesg.service unit file
      become: yes
      copy:
        src: /tmp/dmesg_saver/systemd/mv-dmesg.service
        dest: /etc/systemd/system/mv-dmesg.service
        mode: '0644'
        remote_src: yes

    - name: reload systemd daemon
      become: yes
      systemd:
        daemon_reload: yes

    - name: enable mv-dmesg service
      become: yes
      systemd:
        name: mv-dmesg.service
        enabled: yes

    - name: ensure ~/.ssh directory exists
      become: no
      file:
        path: "/home/{{ target_user }}/.ssh"
        state: directory
        mode: '0700'

    - name: generate SSH key pair if not present
      become: no
      command: >
        ssh-keygen -t rsa -b 4096
        -C "{{ target_user }}@{{ ansible_hostname }}"
        -f "/home/{{ target_user }}/.ssh/id_rsa"
        -N ""
      args:
        creates: "/home/{{ target_user }}/.ssh/id_rsa"

    - name: check if storage host key already in known_hosts
      become: no
      command: >
        ssh-keygen -F {{ storage_host }}
        -f "/home/{{ target_user }}/.ssh/known_hosts"
      register: known_hosts_check
      changed_when: false
      failed_when: false

    - name: scan storage host key and add to known_hosts
      become: no
      shell: >
        ssh-keyscan -H {{ storage_host }}
        >> "/home/{{ target_user }}/.ssh/known_hosts"
      args:
        executable: /bin/bash
      when: known_hosts_check.rc != 0
      changed_when: true

    - name: slurp sending host public key
      become: no
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa.pub"
      register: sending_host_pubkey

    - name: remove cloned repo from /tmp
      become: yes
      file:
        path: /tmp/dmesg_saver
        state: absent

# =============================================================================
# Play 2: Prepare the storage host
# =============================================================================
- name: Prepare storage host to receive dmesg files
  hosts: "{{ storage_host }}"
  tasks:

    - name: create destination directory for sending host
      become: yes
      file:
        path: "/mnt/dmesg/IoT/{{ hostvars[target_host]['ansible_hostname'] }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: get connecting username on storage host
      become: no
      command: id -un
      register: storage_connecting_user
      changed_when: false

    - name: ensure ~/.ssh exists on storage host
      become: no
      file:
        path: "/home/{{ storage_connecting_user.stdout }}/.ssh"
        state: directory
        mode: '0700'

    - name: authorize sending host public key on storage host
      become: no
      authorized_key:
        user: "{{ storage_connecting_user.stdout }}"
        state: present
        key: "{{ hostvars[target_host]['sending_host_pubkey']['content'] | b64decode }}"
