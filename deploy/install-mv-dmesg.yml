---
# install-mv-dmesg.yml
#
# Install the mv-dmesg script and systemd service on the sending host, and
# prepare the storage host to receive dmesg files.
#
# Usage:
#   ansible-playbook install-mv-dmesg.yml -i inventory -b -K \
#       --extra-vars "target_host=ryugu storage_host=<hostname>"
#
# Prerequisites:
#   - git must be installed on the sending host (post-boot.yml handles this)
#   - /mnt/data/save must exist on the sending host (rpi_repartition.sh handles this)
#   - /mnt/dmesg/IoT must already exist on the storage host
#   - Passwordless SSH from the Ansible control node to both hosts
#   - target_host and storage_host must both be defined in inventory

# =============================================================================
# Play 1: Prepare the sending host, gather key and hostname for Play 2
# =============================================================================
- name: Configure target host
  hosts: "{{ target_host }}"
  become: yes
    
  roles:
      - user_setup
      - data_mount
      - dmesg_saver

# =============================================================================
# Play 2: Prepare the storage host
# =============================================================================
- name: Prepare storage host to receive dmesg files
  hosts: "{{ storage_host }}"
  tasks:

    - name: get connecting username on storage host
      become: no
      command: id -un
      register: storage_connecting_user
      changed_when: false

    - name: create destination directory for sending host
      become: yes
      file:
        path: "/mnt/dmesg/IoT/{{ hostvars[target_host]['ansible_hostname'] }}"
        state: directory
        mode: '0755'
        owner: "{{ storage_connecting_user.stdout }}"
        group: "{{ storage_connecting_user.stdout }}"

    - name: ensure ~/.ssh exists on storage host
      become: no
      file:
        path: "/home/{{ storage_connecting_user.stdout }}/.ssh"
        state: directory
        mode: '0700'

    - name: authorize sending host public key on storage host
      become: no
      authorized_key:
        user: "{{ storage_connecting_user.stdout }}"
        state: present
        key: "{{ hostvars[target_host].sending_host_pubkey.stdout }}"