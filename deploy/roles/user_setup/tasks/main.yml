- name: Ensure ~/.ssh exists
  become: no
  file:
    path: "/home/{{ target_user }}/.ssh"
    state: directory
    mode: '0700'

- name: Generate SSH key pair if not present
  become: no
  command: >
    ssh-keygen -t rsa -b 4096
    -C "{{ target_user }}@{{ ansible_hostname }}"
    -f "/home/{{ target_user }}/.ssh/id_rsa"
    -N ""
  args:
    creates: "/home/{{ target_user }}/.ssh/id_rsa"

- name: Check if storage host key already in known_hosts
  become: no
  command: >
    ssh-keygen -F {{ storage_host }}
    -f "/home/{{ target_user }}/.ssh/known_hosts"
  register: known_hosts_check
  changed_when: false
  failed_when: false

- name: Add storage host to known_hosts
  become: no
  shell: >
    ssh-keyscan -H {{ storage_host }}
    >> "/home/{{ target_user }}/.ssh/known_hosts"
  args:
    executable: /bin/bash
  when: known_hosts_check.rc != 0
  changed_when: true

- name: Read public key
  become: no
  command: cat "/home/{{ target_user }}/.ssh/id_rsa.pub"
  register: sending_host_pubkey
  changed_when: false