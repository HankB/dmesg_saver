---
# install-dmesg-saver.yml
#
# Install the dmesg_saver scripts and systemd system service.
#
# Clones https://github.com/HankB/dmesg_saver to /tmp on the target,
# installs the script to /usr/local/bin, renders and installs the unit
# file to /etc/systemd/system/, and enables the service.
#
# Typical usage (from a top-level playbook):
#   - include_tasks: install-dmesg-saver.yml
#
# Prerequisites:
#   - git must be installed (post-boot.yml handles this)
#   - /mnt/data must be present as a mount point (rpi_repartition.sh handles this)

- name: get connecting username
  become: no
  command: id -un
  register: connecting_user
  changed_when: false

- name: set ownership of /mnt/data to connecting user
  become: yes
  file:
    path: /mnt/data
    state: directory
    owner: "{{ connecting_user.stdout }}"
    group: "{{ connecting_user.stdout }}"
    recurse: yes

- name: clone dmesg_saver repo to /tmp
  become: no
  git:
    repo: https://github.com/HankB/dmesg_saver.git
    dest: /tmp/dmesg_saver
    version: main
    force: yes

- name: install save-dmesg.sh to /usr/local/bin
  become: yes
  copy:
    src: /tmp/dmesg_saver/save-dmesg.sh
    dest: /usr/local/bin/save-dmesg.sh
    mode: '0755'
    remote_src: yes

- name: substitute username in save-dmesg.service template
  become: no
  replace:
    path: /tmp/dmesg_saver/systemd/save-dmesg.service
    regexp: '{% raw %}{{ username }}{% endraw %}'
    replace: "{{ connecting_user.stdout }}"

- name: install save-dmesg.service unit file
  become: yes
  copy:
    src: /tmp/dmesg_saver/systemd/save-dmesg.service
    dest: /etc/systemd/system/save-dmesg.service
    mode: '0644'
    remote_src: yes

- name: reload systemd daemon
  become: yes
  systemd:
    daemon_reload: yes

- name: enable save-dmesg service
  become: yes
  systemd:
    name: save-dmesg.service
    enabled: yes

- name: remove cloned repo from /tmp
  become: yes
  file:
    path: /tmp/dmesg_saver
    state: absent
